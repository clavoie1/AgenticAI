<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fabrics Expert QA - RAG Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card { @apply bg-white rounded-2xl shadow-md p-6 border border-gray-100; }
    .label { @apply text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 block; }
    .input { @apply w-full rounded-xl border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50; }
    .btn { @apply inline-flex items-center justify-center gap-2 rounded-xl px-6 py-3 font-semibold transition-all; }
    .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased pb-20">

  <div class="max-w-4xl mx-auto p-6 space-y-8">
    
    <header class="flex items-center justify-between border-b pb-6">
      <div>
        <h1 class="text-3xl font-extrabold text-slate-800">Fabrics Expert <span class="text-blue-600">QA</span></h1>
        <p class="text-slate-500 mt-1">Real-world RAG implementation for product documents</p>
      </div>
      <div class="text-right">
        <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase">GPT-5-Mini</span>
      </div>
    </header>

    <section class="grid md:grid-cols-2 gap-6">
      <div class="card">
        <label class="label">API Key (Prefilled)</label>
        <input id="apiKey" type="password" class="input" value="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">
      </div>
      <div class="card">
        <label class="label">Knowledge Base (Updated Context)</label>
        <textarea id="context" class="input h-32 text-sm">
Document A: Our premium Silk-Blend fabric requires dry cleaning only. It is composed of 70% silk and 30% cotton.
Document B: The 'Ever-Tough' polyester series is water-resistant and suitable for outdoor upholstery. 
Document C: For stain removal on linen, use lukewarm water and mild detergent; avoid bleach.
Document D: For silk maintenance, schedule professional inspection every 6 months to prevent fiber degradation.</textarea>
      </div>
    </section>

    <section class="card border-l-4 border-l-blue-600">
      <div class="grid gap-4">
        <div>
          <label class="label">Select Pre-defined Question</label>
          <select id="questionDropdown" class="input mb-4" onchange="document.getElementById('question').value = this.value">
            <option value="" disabled selected>Choose a question...</option>
            <option value="What is the composition of the Silk-Blend fabric?">Composition of Silk-Blend</option>
            <option value="How should I clean the 'Ever-Tough' series?">Cleaning Ever-Tough</option>
            <option value="Can I use bleach on linen?">Bleach on Linen</option>
            <option value="Is the polyester fabric waterproof?">Polyester Waterproofness</option>
            <option value="What is the recommended follow-up for silk maintenance?">Silk Maintenance Follow-up</option>
          </select>
        </div>

        <div>
          <label class="label">Or Type Your Own</label>
          <div class="flex flex-col md:flex-row gap-3">
            <input id="question" type="text" class="input flex-1" placeholder="Enter your question here...">
            <button id="askBtn" onclick="askQuestion()" class="btn btn-primary">Run Query</button>
          </div>
        </div>
      </div>
    </section>

    <section id="results" class="space-y-4">
      <h2 class="text-lg font-bold text-slate-700 italic">Output Terminal</h2>
      <div id="placeholder" class="text-center py-10 text-gray-400 bg-white rounded-2xl border border-dashed">
        Awaiting input...
      </div>
    </section>

  </div>

  <script>
    async function askQuestion() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const question = document.getElementById('question').value.trim();
      const context = document.getElementById('context').value.trim();
      const btn = document.getElementById('askBtn');
      const resultsContainer = document.getElementById('results');

      if (!apiKey || !question) return alert("Please ensure API Key and Question are present.");

      btn.disabled = true;
      btn.textContent = "Querying...";
      if(document.getElementById('placeholder')) document.getElementById('placeholder').remove();

      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-4o", // Placeholder for GPT-5 in current API
            messages: [
              { role: "system", content: "You are a Fabrics Expert QA assistant. Answer ONLY using the provided context. Keep answers concise (≤25 words)." },
              { role: "user", content: `CONTEXT:\n${context}\n\nQuestion: ${question}` }
            ],
            temperature: 0
          })
        });

        const data = await response.json();
        const answer = data.choices[0].message.content;
        
        const div = document.createElement('div');
        div.className = "card border-l-4 border-l-green-500 animate-in fade-in slide-in-from-top-2 duration-300 mb-4";
        div.innerHTML = `<p class="text-xs text-blue-600 font-bold mb-1">Q: ${question}</p><p class="text-slate-700">${answer}</p>`;
        resultsContainer.insertBefore(div, resultsContainer.firstChild.nextSibling);
      } catch (error) {
        alert("Error connecting to API. Check your key.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Run Query";
      }
    }
  </script>
</body>
</html>
